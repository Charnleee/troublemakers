<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | Troublemakers MMA</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--black);
      position: relative;
      overflow: hidden;
    }
    .page-404::before {
      content: '404';
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(15rem, 40vw, 30rem);
      color: rgba(255,215,0,0.03);
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }
    .err-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 15vw, 10rem);
      color: var(--gold);
      text-shadow: 0 0 60px rgba(255,215,0,0.5);
      line-height: 1;
      display: block;
    }
    .err-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      letter-spacing: 4px;
      margin-bottom: 1rem;
    }
    .err-sub {
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      max-width: 400px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
    }
    .err-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

<div class="page-404">
  <div class="position-relative" style="z-index:2">
    <span class="err-num">404</span>
    <h1 class="err-title">ROUND NOT FOUND</h1>
    <p class="err-sub">Looks like this page tapped out. It might have been moved, deleted, or never existed. Let's get you back in the fight.</p>
    <div class="err-links">
      <a href="index.html" class="btn btn-primary-gold">GO HOME</a>
      <a href="contact.html" class="btn btn-outline-gold">CONTACT US</a>
    </div>
    <div class="mt-4" style="color:rgba(255,255,255,0.3); font-family:'Orbitron',sans-serif; font-size:0.6rem; letter-spacing:3px;">
      TROUBLEMAKERS MMA &amp; FITNESS — PALMSTEAD, CAPE TOWN
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
